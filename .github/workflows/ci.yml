name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  python:
    name: Python checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: python -m ruff check .

      - name: Unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python files
        run: python -m py_compile $(find . -name '*.py' -not -path './.venv/*')

  rust:
    name: Rust tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --manifest-path apps/cidadao_de_olho/Cargo.toml --locked

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/cidadao_de_olho/ui/package-lock.json

      - name: Install dependencies
        working-directory: apps/cidadao_de_olho/ui
        run: npm ci

      - name: Build
        working-directory: apps/cidadao_de_olho/ui
        run: npm run build
